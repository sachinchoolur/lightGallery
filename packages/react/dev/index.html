<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0"
        />
        <title>@lightgallery/react — dev demo</title>
        <style>
            body {
                font-family: system-ui, sans-serif;
                margin: 0 auto;
                max-width: 960px;
                padding: 24px;
            }
            .demo-grid {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
                gap: 12px;
            }
            .demo-grid a {
                display: block;
            }
            .demo-grid img {
                width: 100%;
                height: 110px;
                object-fit: cover;
                border-radius: 4px;
                display: block;
            }
            .demo-controls {
                display: flex;
                gap: 8px;
                margin: 12px 0 24px;
                flex-wrap: wrap;
                align-items: center;
            }
            /* Tall page so scroll lock/restore is visible. */
            .demo-spacer {
                height: 60vh;
            }
        </style>
    </head>
    <body>
        <div id="root"></div>
        <script type="module" src="/main.tsx"></script>
    </body>
</html>
