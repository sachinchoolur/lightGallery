name: Build parity

on:
  push:
    branches:
      - v3
  pull_request:
    branches:
      - v3

jobs:
  build-parity:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build legacy artifacts
        run: pnpm run build:legacy

      - name: Build Vite artifacts
        run: pnpm run build:vite

      - name: Verify build parity
        run: pnpm run verify:parity
