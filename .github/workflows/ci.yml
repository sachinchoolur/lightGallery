name: CI

on:
  push:
    branches:
      - v3
  pull_request:
    branches:
      - v3

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Production test gate
        run: pnpm run test:prod

      - name: Build
        run: pnpm run build

  react-package:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        react-version: [18, 19]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Use React ${{ matrix.react-version }}
        if: matrix.react-version != 18
        run: pnpm --filter @lightgallery/react add -D react@^${{ matrix.react-version }} react-dom@^${{ matrix.react-version }}

      - name: Typecheck packages
        run: |
          pnpm --filter @lightgallery/headless run typecheck
          pnpm --filter @lightgallery/react run typecheck

      - name: Test packages
        run: |
          pnpm --filter @lightgallery/headless test
          pnpm --filter @lightgallery/react test

      - name: Build packages
        run: |
          pnpm --filter @lightgallery/headless run build
          pnpm --filter @lightgallery/react run build

      - name: publint
        if: matrix.react-version == 18
        run: |
          pnpm --filter @lightgallery/headless exec pnpm pack --pack-destination /tmp/lg-pack
          pnpm --filter @lightgallery/react exec pnpm pack --pack-destination /tmp/lg-pack
          for tgz in /tmp/lg-pack/*.tgz; do
            dir=$(mktemp -d)
            tar -xzf "$tgz" -C "$dir"
            npx --yes publint@latest "$dir/package" --strict
          done

  angular-package:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # The supported window is the last 2 Angular majors (peers
        # >=21 <23). Add 22 here when it releases.
        angular-version: [21]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm --filter @lightgallery/angular run typecheck

      - name: Test (zoneless)
        run: pnpm --filter @lightgallery/angular test

      - name: Build (APF)
        run: |
          pnpm --filter @lightgallery/headless run build
          pnpm --filter @lightgallery/angular run build

      - name: publint
        run: npx --yes publint@latest packages/angular/dist --strict

      - name: Pack artifacts
        run: |
          mkdir -p /tmp/lg-pack
          pnpm --filter @lightgallery/headless exec pnpm pack --pack-destination /tmp/lg-pack
          cd packages/angular/dist && npm pack --pack-destination /tmp/lg-pack

      - name: Scratch consumer (AOT + SSR, Angular ${{ matrix.angular-version }})
        run: |
          cd /tmp
          npx -y @angular/cli@${{ matrix.angular-version }} new lg-scratch \
            --minimal --skip-git --ssr --style css --defaults
          cd lg-scratch
          npm i /tmp/lg-pack/lightgallery-headless-*.tgz \
                /tmp/lg-pack/lightgallery-angular-*.tgz \
                @angular/cdk@${{ matrix.angular-version }}
          cp "$GITHUB_WORKSPACE/packages/angular/ci/scratch-app.ts" src/app/app.ts
          npx ng build
          # SSR contract: triggers prerender, the overlay never does.
          grep -q 'alt="First"' dist/lg-scratch/browser/index.html
          ! grep -q 'lg-container' dist/lg-scratch/browser/index.html
